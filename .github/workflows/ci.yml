name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Linux quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets
      - run: bash scripts/check-architecture.sh
      - run: cargo build --release

  native-platform:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            os: ubuntu-latest
          - name: Ubuntu aarch64
            os: ubuntu-24.04-arm
          - name: macOS x86_64
            os: macos-15-intel
          - name: macOS aarch64
            os: macos-15
          - name: Windows x86_64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-targets
      - run: cargo test --all-targets
      - name: Explain platform-specific integration coverage
        if: runner.os != 'Linux'
        shell: bash
        run: echo 'Linux fake-PATH and PTY integration tests are skipped on this host; portable unit and compilation tests ran above.'

  linux-cross-targets:
    name: Linux cross-check · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo check --all-targets --target "${{ matrix.target }}"

  linux-family-contracts:
    name: Linux family provider contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate Debian, Red Hat, Arch, SUSE, and Alpine bootstrap mappings
        run: cargo test bootstrap::providers --lib
