name: Bug report
description: Report incorrect behavior in Allp or a backend.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thank you for reporting a problem. Do not include passwords or private repository credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      render: shell
    validations:
      required: true
  - type: textarea
    id: detect
    attributes:
      label: allp detect --json
      render: json
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Distribution and version
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and native output
    validations:
      required: true
